<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Price Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-section { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; padding: 40px 0; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="header-section text-center">
        <div class="container">
            <h1 class="display-4 fw-bold">Car Price Estimator</h1>
            <p class="lead">Get an accurate market valuation for your vehicle using Machine Learning</p>
        </div>
    </div>

    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card p-4">
                    <form action="/predict" method="POST">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Registration Year</label>
                                <input type="number" name="year" class="form-control" placeholder="e.g. 2018" required min="1900" max="2026">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Kilometers Driven</label>
                                <input type="number" name="km_driven" class="form-control" placeholder="e.g. 45000" required>
                            </div>
                            
                            <div class="col-md-4">
                                <label class="form-label">Fuel Type</label>
                                <select name="fuel" class="form-select">
                                    <option value="1">Petrol</option>
                                    <option value="2">Diesel</option>
                                    <option value="3">CNG</option>
                                    <option value="4">LPG</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Seller Type</label>
                                <select name="seller_type" class="form-select">
                                    <option value="1">Individual</option>
                                    <option value="2">Dealer</option>
                                    <option value="3">Trustmark Dealer</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Transmission</label>
                                <select name="transmission" class="form-select">
                                    <option value="1">Manual</option>
                                    <option value="2">Automatic</option>
                                </select>
                            </div>

                            <div class="col-md-3">
                                <label class="form-label">Owner Type</label>
                                <select name="owner" class="form-select">
                                    <option value="1">First Owner</option>
                                    <option value="2">Second Owner</option>
                                    <option value="3">Third Owner</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Mileage (kmpl)</label>
                                <input type="number" step="0.01" name="mileage" class="form-control" placeholder="e.g. 18.5" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Engine (CC)</label>
                                <input type="number" step="0.01" name="engine" class="form-control" placeholder="e.g. 1248" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Max Power (bhp)</label>
                                <input type="number" step="0.01" name="max_power" class="form-control" placeholder="e.g. 88.5" required>
                            </div>
                            
                            <div class="col-md-6 offset-md-3">
                                <label class="form-label">Number of Seats</label>
                                <input type="number" name="seats" class="form-control" placeholder="e.g. 5" required>
                            </div>

                            <div class="col-12 text-center mt-4">
                                <button type="submit" class="btn btn-primary btn-lg px-5">Estimate Price</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center text-muted py-4">
        <p>&copy; 2026 ML Car Price Prediction System</p>
    </footer>
</body>
</html>
